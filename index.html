<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Recommendation System</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header>
        <h1>Client Website Recommendations</h1>
        <p>Professional Website Recommendation Dashboard</p>
    </header>

    <main class="container">

        <!-- Add Recommendation Form -->
        <section class="form-section">
            <h2>Add Recommendation</h2>

            <form id="recommendationForm">
                <input type="text" id="title" placeholder="Website Title" required />

                <textarea id="description" placeholder="Website Description" required></textarea>

                <input type="url" id="link" placeholder="Website Link" required />

                <button type="submit">Add Recommendation</button>
            </form>
        </section>

        <!-- Recommendation List -->
        <section class="recommendation-section">
            <h2>Recommendations</h2>

            <div id="recommendationList" class="recommendation-list">

                <!-- Recommendation Card -->
                <div class="card">
                    <h3>Portfolio Website</h3>

                    <p>
                        A modern responsive portfolio website made using HTML and CSS.
                    </p>

                    <a href="#" target="_blank">Visit Website</a>

                    <div class="buttons">
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <script>
        const form = document.getElementById("recommendationForm");
        const recommendationList = document.getElementById("recommendationList");

        let editCard = null;

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const link = document.getElementById("link").value;

            if (editCard) {
                editCard.querySelector("h3").textContent = title;
                editCard.querySelector("p").textContent = description;
                editCard.querySelector("a").href = link;

                editCard = null;
            } else {
                addRecommendation(title, description, link);
            }

            form.reset();
        });

        function addRecommendation(title, description, link) {
            const card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
                <h3>${title}</h3>
                <p>${description}</p>
                <a href="${link}" target="_blank">Visit Website</a>

                <div class="buttons">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>
            `;

            recommendationList.appendChild(card);

            const editBtn = card.querySelector(".edit-btn");
            const deleteBtn = card.querySelector(".delete-btn");

            editBtn.addEventListener("click", function () {
                document.getElementById("title").value =
                    card.querySelector("h3").textContent;

                document.getElementById("description").value =
                    card.querySelector("p").textContent;

                document.getElementById("link").value =
                    card.querySelector("a").href;

                editCard = card;
            });

            deleteBtn.addEventListener("click", function () {
                card.remove();
            });
        }
    </script>

</body>
</html>
